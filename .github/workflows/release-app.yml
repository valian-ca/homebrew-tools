name: release-app

on:
  push:
    tags:
      - "review-triage-app-*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: build, sign, notarize, release
    # Blacksmith macOS-15 runner: Apple Silicon M4, 6 vCPU, ~2x faster than
    # GitHub-hosted `macos-15` (M1/M2) at half the per-minute cost ($0.08/min
    # vs $0.16/min). Drop-in replacement — Xcode + standard macOS toolchain
    # are pre-installed. Convention aligns with the Ubuntu side of the Valian
    # mobile-app-template, which already runs on Blacksmith
    # (`blacksmith-8vcpu-ubuntu-2404`). The `blacksmith-sh` GitHub App is
    # installed on the valian-ca org.
    runs-on: blacksmith-6vcpu-macos-15
    env:
      APP_NAME: ReviewTriage
      APP_DIR: app/review-triage
      SCHEME: ReviewTriage
      EXPORT_DIR: build/export
      ARCHIVE_PATH: build/ReviewTriage.xcarchive
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: |
          tag="${GITHUB_REF##*/}"
          version="${tag#review-triage-app-}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.APP_DIR }}
        run: xcodegen generate

      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          CERT_PASS: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          trap 'rm -f /tmp/cert.p12' EXIT
          KEYCHAIN=signing.keychain-db
          KEYCHAIN_PASS=$(uuidgen)
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$CERT_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Set version in xcconfig
        working-directory: ${{ env.APP_DIR }}
        run: |
          set -euo pipefail
          sed -i '' "s/^MARKETING_VERSION = .*/MARKETING_VERSION = ${{ steps.ver.outputs.version }}/" Configs/Shared.xcconfig

      - name: Archive
        working-directory: ${{ env.APP_DIR }}
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project ReviewTriage.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "../../${{ env.ARCHIVE_PATH }}" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            | xcbeautify --renderer github-actions || true

      - name: Write export options
        run: |
          mkdir -p ${{ env.EXPORT_DIR }}
          cat > ${{ env.EXPORT_DIR }}/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Developer ID Application</string>
          </dict>
          </plist>
          EOF

      - name: Export signed .app
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "${{ env.ARCHIVE_PATH }}" \
            -exportPath "${{ env.EXPORT_DIR }}" \
            -exportOptionsPlist "${{ env.EXPORT_DIR }}/ExportOptions.plist"

      - name: Store notarytool credentials
        env:
          ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          KEY_B64: ${{ secrets.APPLE_NOTARY_KEY }}
        run: |
          set -euo pipefail
          trap 'rm -f /tmp/notary_key.p8' EXIT
          echo "$KEY_B64" | base64 --decode > /tmp/notary_key.p8
          xcrun notarytool store-credentials AC_NOTARY \
            --key /tmp/notary_key.p8 \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID"

      - name: Zip for notarization
        run: |
          set -euo pipefail
          cd ${{ env.EXPORT_DIR }}
          ditto -c -k --keepParent "${APP_NAME}.app" "ReviewTriage-${{ steps.ver.outputs.version }}-notarize.zip"

      - name: Submit to notarytool
        run: |
          set -euo pipefail
          xcrun notarytool submit \
            "${{ env.EXPORT_DIR }}/ReviewTriage-${{ steps.ver.outputs.version }}-notarize.zip" \
            --keychain-profile AC_NOTARY \
            --wait

      - name: Staple
        run: xcrun stapler staple "${{ env.EXPORT_DIR }}/${APP_NAME}.app"

      - name: Re-zip the stapled .app
        id: package
        run: |
          set -euo pipefail
          cd ${{ env.EXPORT_DIR }}
          OUT="ReviewTriage-${{ steps.ver.outputs.version }}.zip"
          rm -f "$OUT"
          ditto -c -k --keepParent "${APP_NAME}.app" "$OUT"
          SHA=$(shasum -a 256 "$OUT" | awk '{print $1}')
          echo "zip=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: ${{ env.EXPORT_DIR }}/${{ steps.package.outputs.zip }}
          body: |
            Signed and notarized release of the `review-triage` macOS app.

            **SHA256:** `${{ steps.package.outputs.sha256 }}`

            Update `Casks/review-triage.rb` with the sha256 above and re-run the
            `brew-audit` job to validate the cask against the live tarball.
