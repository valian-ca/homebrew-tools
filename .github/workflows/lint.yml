name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: go vet + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  shellcheck:
    name: shellcheck bin/*
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip if bin/ is empty
        id: check
        run: |
          if compgen -G "bin/*" > /dev/null; then
            echo "has_scripts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_scripts=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install shellcheck
        if: steps.check.outputs.has_scripts == 'true'
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        if: steps.check.outputs.has_scripts == 'true'
        run: shellcheck -x bin/*

  brew-audit:
    name: brew audit (if formulae or casks changed)
    runs-on: blacksmith-6vcpu-macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed formulae and casks
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
          else
            base="${{ github.event.before }}"
          fi
          # On the very first push to main, before is all-zero — skip audit.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "formulae=" >> "$GITHUB_OUTPUT"
            echo "casks=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Convert "Formula/<name>.rb" paths to "valian-ca/tools/<name>" qualified names,
          # since `brew audit` no longer accepts bare paths.
          formulae=$(git diff --name-only "$base"...HEAD -- 'Formula/*.rb' \
            | sed -E 's|^Formula/(.+)\.rb$|valian-ca/tools/\1|' \
            | tr '\n' ' ')
          casks=$(git diff --name-only "$base"...HEAD -- 'Casks/*.rb' \
            | sed -E 's|^Casks/(.+)\.rb$|valian-ca/tools/\1|' \
            | tr '\n' ' ')
          echo "formulae=$formulae" >> "$GITHUB_OUTPUT"
          echo "casks=$casks" >> "$GITHUB_OUTPUT"

      - name: Tap the checkout
        if: steps.changed.outputs.formulae != '' || steps.changed.outputs.casks != ''
        run: brew tap valian-ca/tools "$(pwd)"

      - name: Audit changed formulae
        if: steps.changed.outputs.formulae != ''
        run: brew audit --strict --online ${{ steps.changed.outputs.formulae }}

      - name: Audit changed casks
        # --online is intentionally omitted on PRs because the cask points at a
        # release artifact that may not exist yet. Tag-first release pushes the
        # tag (which triggers release-app.yml to upload the artifact), then the
        # follow-up commit updates the sha256 and re-runs this job — at which
        # point --online would pass. For PRs we get strict offline checks only.
        if: steps.changed.outputs.casks != ''
        run: brew audit --strict --cask ${{ steps.changed.outputs.casks }}

  swift:
    name: swift build + test (app/review-triage)
    # Blacksmith macOS-15 M4 — drops the swift test job from ~6m30s on
    # GitHub-hosted macos-15 (M1/M2) to ~3 min. Symmetric with the runner
    # choice in release-app.yml. See that workflow for cost/perf rationale.
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Skip if app/review-triage is absent
        id: check
        run: |
          if [ -d app/review-triage ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install XcodeGen
        if: steps.check.outputs.present == 'true'
        run: brew install xcodegen
      - name: Generate Xcode project
        if: steps.check.outputs.present == 'true'
        working-directory: app/review-triage
        run: xcodegen generate
      - name: Build and test
        if: steps.check.outputs.present == 'true'
        working-directory: app/review-triage
        run: |
          xcodebuild test \
            -project ReviewTriage.xcodeproj \
            -scheme ReviewTriage \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=""
