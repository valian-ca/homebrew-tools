name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: go vet + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  shellcheck:
    name: shellcheck bin/*
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip if bin/ is empty
        id: check
        run: |
          if compgen -G "bin/*" > /dev/null; then
            echo "has_scripts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_scripts=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install shellcheck
        if: steps.check.outputs.has_scripts == 'true'
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        if: steps.check.outputs.has_scripts == 'true'
        run: shellcheck -x bin/*

  brew-audit:
    name: brew audit (if formulae changed)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed formulae
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
          else
            base="${{ github.event.before }}"
          fi
          # On the very first push to main, before is all-zero — skip audit.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "names=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Convert "Formula/<name>.rb" paths to "valian-ca/tools/<name>" qualified names,
          # since `brew audit` no longer accepts bare paths.
          names=$(git diff --name-only "$base"...HEAD -- 'Formula/*.rb' \
            | sed -E 's|^Formula/(.+)\.rb$|valian-ca/tools/\1|' \
            | tr '\n' ' ')
          echo "names=$names" >> "$GITHUB_OUTPUT"

      - name: Tap the checkout
        if: steps.changed.outputs.names != ''
        run: brew tap valian-ca/tools "$(pwd)"

      - name: Run brew audit
        if: steps.changed.outputs.names != ''
        run: brew audit --strict --online ${{ steps.changed.outputs.names }}
