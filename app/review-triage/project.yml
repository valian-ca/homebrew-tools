name: ReviewTriage

options:
  bundleIdPrefix: ca.valian
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "26.0"

configs:
  Debug: debug
  Release: release

settings:
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      GCC_OPTIMIZATION_LEVEL: 0
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O
      GCC_OPTIMIZATION_LEVEL: s

packages:
  SwiftTreeSitter:
    url: https://github.com/ChimeHQ/SwiftTreeSitter
    from: "0.9.0"
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"
  TreeSitterTypeScript:
    url: https://github.com/tree-sitter/tree-sitter-typescript
    branch: master
  TreeSitterJava:
    url: https://github.com/tree-sitter/tree-sitter-java
    branch: master
  TreeSitterGo:
    url: https://github.com/tree-sitter/tree-sitter-go
    branch: master
  TreeSitterKotlin:
    url: https://github.com/fwcd/tree-sitter-kotlin
    branch: main
  # TODO(VAL-238): expand syntax highlighting to JavaScript, Python, Ruby, Bash, Swift, Dart, SQL, HCL — see VAL-238 essai report for upstream package issues

targets:
  ReviewTriage:
    type: application
    platform: macOS
    sources:
      - path: ReviewTriage
        excludes:
          - "**/.DS_Store"
    configFiles:
      Debug: Configs/App.xcconfig
      Release: Configs/App.xcconfig
    info:
      path: ReviewTriage/Info.plist
      properties:
        CFBundleDisplayName: Review Triage
        CFBundleName: $(PRODUCT_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: "© Valian"
    dependencies:
      - package: SwiftTreeSitter
      - package: ArgumentParser
        product: ArgumentParser
      - package: TreeSitterTypeScript
        product: TreeSitterTypeScript
      - package: TreeSitterJava
      - package: TreeSitterGo
      - package: TreeSitterKotlin
      - target: ReviewTriageCLI
        link: false
    postBuildScripts:
      - name: Embed CLI shim in app bundle
        script: |
          set -euo pipefail
          CLI_SRC="${BUILT_PRODUCTS_DIR}/review-triage-cli"
          CLI_DST="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}/Contents/MacOS/review-triage-cli"
          if [ ! -f "$CLI_SRC" ]; then
            echo "error: CLI binary missing at $CLI_SRC" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$CLI_DST")"
          cp -f "$CLI_SRC" "$CLI_DST"
          chmod +x "$CLI_DST"
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(WRAPPER_NAME)/Contents/MacOS/review-triage-cli

  ReviewTriageCLI:
    type: tool
    platform: macOS
    sources:
      - path: ReviewTriageCLI
    configFiles:
      Debug: Configs/CLI.xcconfig
      Release: Configs/CLI.xcconfig
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser

  ReviewTriageTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ReviewTriageTests
    configFiles:
      Debug: Configs/Tests.xcconfig
      Release: Configs/Tests.xcconfig
    dependencies:
      - target: ReviewTriage

schemes:
  ReviewTriage:
    build:
      targets:
        # ReviewTriageCLI is intentionally absent: it's a build-time target
        # dependency of ReviewTriage (declared in dependencies above, link:false)
        # and gets copied into ReviewTriage.app/Contents/MacOS/review-triage-cli
        # by the postBuildScript. Including it here as a separate scheme target
        # makes the .xcarchive contain two top-level products (the .app + the
        # CLI binary), which xcodebuild -exportArchive cannot disambiguate for
        # `method = developer-id` ("expected one {} but found developer-id").
        ReviewTriage: all
        ReviewTriageTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ReviewTriageTests
    archive:
      config: Release
